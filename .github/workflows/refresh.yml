name: Refresh toimeained (PPDB)

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Enrich toimeained from PPDB
        run: node scripts/ppdb-enrich.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/toimeained.json
          git diff --staged --quiet || git commit -m "chore: enrich toimeained $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
